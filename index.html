<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/fonts/helvetica-now/stylesheet.css?v=2">
<link rel="stylesheet" href="assets/fonts/neue-haas-unica/stylesheet.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #180a06;
    --card: rgba(255, 255, 255, 0.06);
    --text: #ede4d8;
    --muted: rgba(235, 220, 205, 0.55);
    --radius-card: 24px;
  }

  html, body { height: 100%; }

  body {
    font-family: "Neue Haas Unica", -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Segoe UI", Roboto, sans-serif;
    line-height: 1.2;
    background:
      radial-gradient(ellipse 65% 55% at 15% 52%, rgba(168, 78, 10, 0.22) 0%, transparent 65%),
      radial-gradient(ellipse 52% 48% at 83% 26%, rgba(122, 52, 8, 0.17) 0%, transparent 60%),
      radial-gradient(ellipse 44% 52% at 56% 92%, rgba(98, 36, 5, 0.14) 0%, transparent 58%),
      radial-gradient(ellipse 30% 30% at 72% 75%, rgba(60, 20, 5, 0.10) 0%, transparent 50%),
      #070402;
    display: flex;
    flex-wrap: nowrap;
    justify-content: center;
    align-items: center;
    padding: 36px 24px;
    color: var(--text);
  }

  /* ---- phone mockup frame (matches speakers section) ---- */
  .phone-mockup {
    position: relative;
    flex-shrink: 0;
    zoom: .78;
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0, 0, 0, .6);
  }

  /* phone frame */
  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* responsive scale-down for smaller viewports */
  @media (max-width: 900px) {
    body { flex-wrap: wrap; }
  }
  @media (max-width: 440px) {
    .phone-mockup { zoom: .6; }
  }

  /* ---- hero ---- */
  .hero {
    position: relative;
    width: 100%;
    height: 430px;
  }
  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  .hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(24, 10, 6, 0) 52%,
      rgba(24, 10, 6, 0.55) 78%,
      var(--bg) 100%);
    pointer-events: none;
  }

  /* ---- glass buttons (shared) ---- */
  .glass {
    border: none;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(2px) saturate(1.3);
    -webkit-backdrop-filter: blur(2px) saturate(1.3);
    box-shadow:
      0 8px 22px rgba(0, 0, 0, 0.22),
      /* rim outline | top-left shine | bottom-right shine | inner glow */
      inset 0 0 0 0.6px rgba(255, 255, 255, 0.02),
      inset 1.5px 2px 0 -1px rgba(255, 255, 255, 0.3),
      inset -1.5px -2px 0 -1px rgba(255, 255, 255, 0.3),
      inset 0 0 12px 3px rgba(255, 255, 255, 0.0);
    transition: transform 0.16s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .glass:active { transform: scale(0.92); }
  .glass:focus-visible { outline: 2px solid rgba(255,255,255,0.7); outline-offset: 2px; }

  .glass.circle {
    width: 58px;
    height: 44px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .glass.circle svg { width: 22px; height: 22px; }
  .glass.round {
    width: 46px;
    height: 46px;
    border-radius: 50%;
  }
  .glass.circle img {
    width: 19px;
    height: 19px;
    object-fit: contain;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  .top-bar {
    position: absolute;
    top: 18px;
    left: 18px;
    right: 18px;
    display: flex;
    justify-content: space-between;
    z-index: 3;
  }

  /* ---- identity ---- */
  .identity {
    position: relative;
    margin-top: -112px;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
  }
  .name-row {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .laurel {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    height: 73px;
    width: auto;
    opacity: 0.6;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    /* beige tone is baked into the image pixels */
    /* mostly even, only the top tips soften */
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 45%, rgba(0,0,0,0.95) 100%);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 45%, rgba(0,0,0,0.95) 100%);
  }
  .laurel.left  { right: calc(50% + 66px); }
  .laurel.right { left:  calc(50% + 66px); }
  .name {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .subtitle {
    margin-top: 6px;
    font-size: 15px;
    color: var(--muted);
    font-weight: 400;
  }

  /* ---- achievements pill ---- */
  .achievements-wrap {
    display: flex;
    justify-content: center;
    margin-top: 30px;
    padding: 0 24px;
  }
  .glass.pill {
    height: 54px;
    padding: 0 26px;
    border-radius: 27px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .glass.pill img {
    width: 18px;
    height: 18px;
    object-fit: contain;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ---- stats ---- */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 26px 16px 0;
  }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius-card);
    padding: 14px 8px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .stat-card img {
    width: 56px;
    height: 56px;
    object-fit: contain;
    margin-bottom: 8px;
    user-select: none;
    -webkit-user-drag: none;
  }
  .stat-num {
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label {
    margin-top: 7px;
    font-size: 13px;
    line-height: 1.1;
    color: var(--muted);
  }

  /* ---- favorite card ---- */
  .favorite {
    margin: 12px 16px 0;
    background: var(--card);
    border-radius: var(--radius-card);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .favorite img {
    width: 92px;
    height: 92px;
    object-fit: contain;
    flex-shrink: 0;
    user-select: none;
    -webkit-user-drag: none;
  }
  .fav-text { flex: 1; min-width: 0; }
  .fav-eyebrow {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    opacity: 0.9;
  }
  .fav-title {
    font-size: 19px;
    font-weight: 600;
    margin-top: 2px;
  }
  .fav-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.1;
  }
  .favorite .glass.circle {
    flex-shrink: 0;
    background: rgba(0, 0, 0, 0.26);
  }

  /* partial next card, as in the sample */
  .next-card {
    margin: 12px 16px 0;
    background: var(--card);
    border-radius: var(--radius-card) var(--radius-card) 0 0;
    height: 34px;
  }

  @media (prefers-reduced-motion: reduce) {
    .glass { transition: none; }
  }

  /* ---- subtle entry animations ---- */
  @media (prefers-reduced-motion: no-preference) {
    @keyframes heroReveal {
      from { opacity: 0; transform: scale(1.06); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeRise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .hero {
      animation: heroReveal 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .top-bar .glass.circle:nth-child(1) {
      animation: dropIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
    }
    .top-bar .glass.circle:nth-child(2) {
      animation: dropIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.42s both;
    }
    .laurel.left, .laurel.right {
      animation: fadeIn 0.8s ease-out 0.5s both;
    }
    .name {
      animation: fadeRise 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
    }
    .subtitle {
      animation: fadeRise 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.58s both;
    }
    .achievements-wrap {
      animation: fadeRise 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.66s both;
    }
    .stat-card:nth-child(1) {
      animation: fadeRise 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.74s both;
    }
    .stat-card:nth-child(2) {
      animation: fadeRise 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.80s both;
    }
    .stat-card:nth-child(3) {
      animation: fadeRise 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.86s both;
    }
    .favorite {
      animation: fadeRise 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.94s both;
    }
    .next-card {
      animation: fadeIn 0.6s ease-out 1.02s both;
    }
  }
</style>
</helmet>

<!-- shared defs for liquid glass displacement filters -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs id="liquid-defs"></defs>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {

  /* ---- liquid glass: per-element displacement filter ---- */

  const SVG_NS = 'http://www.w3.org/2000/svg';
  const XLINK_NS = 'http://www.w3.org/1999/xlink';
  const defs = document.getElementById('liquid-defs');
  const mapCache = {};
  let uid = 0;

  function smoothstep(a, b, t) {
    t = Math.min(1, Math.max(0, (t - a) / (b - a)));
    return t * t * (3 - 2 * t);
  }
  function sdRoundedRect(px, py, hw, hh, r) {
    const qx = Math.abs(px) - hw + r;
    const qy = Math.abs(py) - hh + r;
    return Math.min(Math.max(qx, qy), 0) +
           Math.hypot(Math.max(qx, 0), Math.max(qy, 0)) - r;
  }

  function buildMap(w, h, radius) {
    const key = w + 'x' + h + 'r' + radius;
    if (mapCache[key]) return mapCache[key];

    const scale = 2;
    const canvas = document.createElement('canvas');
    canvas.width = w * scale;
    canvas.height = h * scale;
    const ctx = canvas.getContext('2d');
    const img = ctx.createImageData(canvas.width, canvas.height);
    const data = img.data;

    const hw = canvas.width / 2, hh = canvas.height / 2, r = radius * scale;
    const edgeBand = Math.min(16, Math.min(w, h) * 0.32) * scale;

    let i = 0;
    for (let y = 0; y < canvas.height; y++) {
      for (let x = 0; x < canvas.width; x++) {
        const px = x - hw, py = y - hh;
        const d = sdRoundedRect(px, py, hw, hh, r);
        const t = smoothstep(-edgeBand, 0, d);
        const strength = t * t;
        const len = Math.hypot(px, py) || 1;
        data[i++] = 128 + (px / len) * strength * 127;
        data[i++] = 128 + (py / len) * strength * 127;
        data[i++] = 128;
        data[i++] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    mapCache[key] = canvas.toDataURL();
    return mapCache[key];
  }

  function attachGlass(el) {
    const rect = el.getBoundingClientRect();
    const w = Math.round(rect.width), h = Math.round(rect.height);
    if (!w || !h) return;
    const cs = getComputedStyle(el);
    let radius = parseFloat(cs.borderTopLeftRadius) || 0;
    radius = Math.min(radius, Math.min(w, h) / 2);

    const id = 'lg-' + (uid++);
    const filter = document.createElementNS(SVG_NS, 'filter');
    filter.setAttribute('id', id);
    filter.setAttribute('x', '-20%');
    filter.setAttribute('y', '-20%');
    filter.setAttribute('width', '140%');
    filter.setAttribute('height', '140%');
    filter.setAttribute('color-interpolation-filters', 'sRGB');

    const feImage = document.createElementNS(SVG_NS, 'feImage');
    const url = buildMap(w, h, radius);
    feImage.setAttribute('href', url);
    feImage.setAttributeNS(XLINK_NS, 'href', url);
    feImage.setAttribute('x', '0');
    feImage.setAttribute('y', '0');
    feImage.setAttribute('width', w);
    feImage.setAttribute('height', h);
    feImage.setAttribute('preserveAspectRatio', 'none');
    feImage.setAttribute('result', 'map');

    const feDisp = document.createElementNS(SVG_NS, 'feDisplacementMap');
    feDisp.setAttribute('in', 'SourceGraphic');
    feDisp.setAttribute('in2', 'map');
    feDisp.setAttribute('scale', '26');
    feDisp.setAttribute('xChannelSelector', 'R');
    feDisp.setAttribute('yChannelSelector', 'G');

    filter.appendChild(feImage);
    filter.appendChild(feDisp);
    defs.appendChild(filter);

    const value = `url(#${id}) blur(0.3px) saturate(1.3)`;
    el.style.backdropFilter = value;
    el.style.webkitBackdropFilter = value;

    // if the browser rejected the url() filter, fall back to plain blur
    const applied = getComputedStyle(el).backdropFilter ||
                    getComputedStyle(el).webkitBackdropFilter || '';
    if (!applied.includes('url')) {
      el.style.backdropFilter = 'blur(6px) saturate(1.4) brightness(1.08)';
      el.style.webkitBackdropFilter = 'blur(6px) saturate(1.4) brightness(1.08)';
      el.style.background = 'rgba(255,255,255,0.10)';
    }
  }

  requestAnimationFrame(() => {
    document.querySelectorAll('[data-liquid]').forEach(attachGlass);
  });

  }
}
</script>
