<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coffee Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/fonts/helvetica-now/stylesheet.css">
  <link rel="stylesheet" href="/assets/fonts/neue-haas-unica/stylesheet.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="phone-mockup">
  <div class="screen">

    <div class="hero">
      <img src="/assets/images/hero-profile.jpg" alt="Profile photo">
      <div class="top-bar">
        <button class="glass circle" type="button" aria-label="Edit profile">
          <img src="/assets/images/icon-edit.png" alt="">
        </button>
        <button class="glass circle" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="width: 26px; height: 26px">
            <path d="M18 6 6 18M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="identity">
      <img class="laurel left" src="/assets/images/laurel-left.png" alt="" aria-hidden="true">
      <img class="laurel right" src="/assets/images/laurel-right.png" alt="" aria-hidden="true">
      <div class="name-row">
        <h1 class="name">Dasha</h1>
      </div>
      <p class="subtitle">Plum Parfait Latte</p>
    </div>

    <div class="achievements-wrap">
      <button class="glass pill" type="button">
        <img src="/assets/images/icon-trophy.png" alt="">
        12 achievements
      </button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <img src="/assets/images/icon-drinks.webp" alt="">
        <div class="stat-num">154</div>
        <div class="stat-label">drinks<br>consumed</div>
      </div>
      <div class="stat-card">
        <img src="/assets/images/icon-sandwich.webp" alt="">
        <div class="stat-num">36</div>
        <div class="stat-label">sandwiches<br>eaten</div>
      </div>
      <div class="stat-card">
        <img src="/assets/images/icon-cafe.webp" alt="">
        <div class="stat-num">12</div>
        <div class="stat-label">cafes<br>visited</div>
      </div>
    </div>

    <div class="favorite">
      <img src="/assets/images/latte-cup.webp" alt="">
      <div class="fav-text">
        <div class="fav-eyebrow">Favorite</div>
        <div class="fav-title">Latte</div>
        <div class="fav-sub">Ordered 73 times</div>
      </div>
      <button class="glass circle" type="button" aria-label="Change favorite">
        <img src="/assets/images/icon-shuffle.png" alt="">
      </button>
    </div>

    <div class="next-card"></div>

  </div>
</div>

<!-- shared defs for liquid glass displacement filters -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs id="liquid-defs"></defs>
</svg>

<script type="module" src="/main.js"></script>
</body>
</html>
